name: media-downloader

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms384m -Xmx384m
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/29092'"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  rest-app:
    build:
      context: .
      dockerfile: docker/services.Dockerfile
      target: rest-app
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx256m
    volumes:
      - downloads:/data/downloads:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  download-service:
    build:
      context: .
      dockerfile: docker/services.Dockerfile
      target: download-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STORAGE_ROOT: /data/downloads
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx384m
    volumes:
      - downloads:/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  delivery-service:
    build:
      context: .
      dockerfile: docker/services.Dockerfile
      target: delivery-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      PUBLIC_DOWNLOAD_BASE_URL: ${PUBLIC_DOWNLOAD_BASE_URL:?PUBLIC_DOWNLOAD_BASE_URL is required}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx256m
    volumes:
      - downloads:/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  telegram-app:
    build:
      context: .
      dockerfile: docker/services.Dockerfile
      target: telegram-app
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      REST_APP_BASE_URL: http://rest-app:8080
      SERVER_PORT: 8081
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms64m -Xmx192m
    depends_on:
      - rest-app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rest-app

volumes:
  postgres_data:
  kafka_data:
  downloads:
  caddy_data:
  caddy_config:
